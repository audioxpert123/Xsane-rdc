<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rust Mobile Raid Calculator</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Rust Mobile Raid Calculator</h1>

    <input
        type="text"
        id="searchInput"
        placeholder="Search structure..."
    >
</header>

<main id="structuresContainer">

    <!-- Doors -->
    <section>
        <h2>Doors</h2>
        <div class="grid" id="doors"></div>
    </section>

    <!-- Walls -->
    <section>
        <h2>Walls</h2>
        <div class="grid" id="walls"></div>
    </section>

    <!-- Roofs -->
    <section>
        <h2>Roofs</h2>
        <div class="grid" id="roofs"></div>
    </section>

    <!-- Foundations -->
    <section>
        <h2>Foundations</h2>
        <div class="grid" id="foundations"></div>
    </section>

    <!-- Windows -->
    <section>
        <h2>Windows</h2>
        <div class="grid" id="windows"></div>
    </section>

    <!-- Hatches -->
    <section>
        <h2>Hatches</h2>
        <div class="grid" id="hatches"></div>
    </section>

    <!-- External Walls -->
    <section>
        <h2>External Walls & Gates</h2>
        <div class="grid" id="external"></div>
    </section>

    <!-- Misc -->
    <section>
        <h2>Misc</h2>
        <div class="grid" id="misc"></div>
    </section>

</main>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
