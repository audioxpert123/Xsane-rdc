<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Raid Calc</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #ff9500; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; }
        #searchBar { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .card p { margin: 8px 0 0 0; padding: 6px; border-radius: 6px; background: #000; font-size: 0.8em; font-weight: bold; }
        #result-box { margin-top: 25px; padding: 20px; background: #1a1a1a; border-left: 4px solid var(--accent); position: sticky; bottom: 10px; }
    </style>
</head>
<body>

<input type="text" id="searchBar" placeholder="Search structures (e.g. wall, door)..." onkeyup="search()">

<div class="grid" id="container">
    <div class="card" onclick="update('Armored Wall', '16 C4 / 32 Rockets')"><p>Armored Wall</p></div>
    <div class="card" onclick="update('Metal Wall', '8 C4 / 15 Rockets')"><p>Metal Wall</p></div>
    <div class="card" onclick="update('Stone Wall', '4 C4 / 8 Rockets')"><p>Stone Wall</p></div>
    
    <div class="card" onclick="update('Armored Door', '2 C4 / 4 Rockets')"><p>Armored Door</p></div>
    <div class="card" onclick="update('Garage Door', '1 C4 / 2 Rockets')"><p>Garage Door</p></div>
    <div class="card" onclick="update('Sheet Metal Door', '1 C4 / 2 Rockets')"><p>Sheet Door</p></div>
    
    <div class="card" onclick="update('High External Wall', '4 C4 / 8 Rockets')"><p>High Ext. Wall</p></div>
    <div class="card" onclick="update('High Ext. Gate', '9 C4 / 18 Rockets')"><p>High Ext. Gate</p></div>
    
    <div class="card" onclick="update('Armored Floor/Found', '16 C4 / 32 Rockets')"><p>Armored Floor</p></div>
    <div class="card" onclick="update('Metal Floor/Found', '8 C4 / 15 Rockets')"><p>Metal Floor</p></div>
    <div class="card" onclick="update('Window Bars', '2 C4 / 4 Rockets')"><p>Window Bars</p></div>
    <div class="card" onclick="update('Armored Roof', '16 C4 / 32 Rockets')"><p>Armored Roof</p></div>
</div>

<div id="result-box">
    <h3 id="res-name" style="margin:0;">Select an item</h3>
    <p id="res-cost" style="color: var(--accent); font-weight: bold;"></p>
</div>

<script>
    function update(n, c) { document.getElementById('res-name').innerText = n; document.getElementById('res-cost').innerText = c; }
    function search() {
        let input = document.getElementById('searchBar').value.toLowerCase();
        let cards = document.getElementsByClassName('card');
        for (let i = 0; i < cards.length; i++) {
            let p = cards[i].getElementsByTagName('p')[0];
            cards[i].style.display = p.innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }
</script>
</body>
</html>
