<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Raid Calc</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --accent: #ff9500; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .card { 
            background: var(--card); 
            padding: 12px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #333;
            transition: 0.3s;
        }
        
        .card img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
        
        /* Naam ke piche background */
        .card p { 
            background: #000; 
            margin: 0; 
            padding: 8px; 
            border-radius: 6px; 
            font-size: 0.85em; 
            font-weight: 600; 
            color: #ccc;
        }
        
        #result-box { 
            margin-top: 30px; 
            padding: 20px; 
            background: #1a1a1a; 
            border-left: 4px solid var(--accent);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h2 style="text-align: center; margin-bottom: 25px;">RAID CALCULATOR</h2>

<div class="grid">
    <div class="card" onclick="update('Armored Door', '2 C4 / 4 Rockets')">
        <img src="https://via.placeholder.com/150" alt="Door">
        <p>Armored Door</p>
    </div>
    <div class="card" onclick="update('Garage Door', '1 C4 / 2 Rockets')">
        <img src="https://via.placeholder.com/150" alt="Door">
        <p>Garage Door</p>
    </div>
</div>

<div id="result-box">
    <h3 id="res-name" style="margin:0;">Select Item</h3>
    <p id="res-cost" style="color: var(--accent); font-weight: bold; margin-top: 10px;"></p>
</div>

<script>
    function update(name, cost) {
        document.getElementById('res-name').innerText = name;
        document.getElementById('res-cost').innerText = cost;
    }
</script>
</body>
</html>
