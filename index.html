<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rust Raid Calculator</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 15px; }
        select { width: 100%; padding: 12px; background: #222; color: white; border: 1px solid #444; border-radius: 6px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #1a1a1a; padding: 10px; border-radius: 6px; border: 1px solid #333; text-align: center; }
        h4 { margin-top: 20px; border-bottom: 2px solid #ff9500; padding-bottom: 5px; }
    </style>
</head>
<body>

<h3>Structure Select Karo:</h3>
<select id="s" onchange="calc()">
    <option value="armored_wall">Armored Wall/Floor/Found</option>
    <option value="metal_wall">Metal Wall/Floor/Found</option>
    <option value="stone_wall">Stone Wall/Floor/Found</option>
    <option value="armored_door">Armored Door</option>
    <option value="garage_door">Garage Door</option>
    <option value="sheet_door">Sheet Metal Door</option>
    <option value="window_bars">Window Bars</option>
    <option value="high_wall">High External Wall</option>
</select>

<div id="res"></div>

<script>
    // Latest Raid Costs (C4/Rocket/Satchel)
    const data = {
        "armored_wall": { name: "Armored (Wall/Floor/Found)", c4: 16, rocket: 32, satchel: 182 },
        "metal_wall": { name: "Metal (Wall/Floor/Found)", c4: 8, rocket: 15, satchel: 46 },
        "stone_wall": { name: "Stone (Wall/Floor/Found)", c4: 4, rocket: 8, satchel: 10 },
        "armored_door": { name: "Armored Door", c4: 2, rocket: 4, satchel: 12 },
        "garage_door": { name: "Garage Door", c4: 1, rocket: 2, satchel: 9 },
        "sheet_door": { name: "Sheet Metal Door", c4: 1, rocket: 2, satchel: 4 },
        "window_bars": { name: "Window Bars", c4: 2, rocket: 4, satchel: 5 },
        "high_wall": { name: "High External Wall", c4: 4, rocket: 8, satchel: 18 }
    };

    function calc() {
        let key = document.getElementById('s').value;
        let item = data[key];
        document.getElementById('res').innerHTML = `
            <div class="card">
                <h4>${item.name}</h4>
                <p>C4: <b>${item.c4}</b></p>
                <p>Rockets: <b>${item.rocket}</b></p>
                <p>Satchels: <b>${item.satchel}</b></p>
            </div>
        `;
    }
    // Load default
    calc();
</script>
</body>
</html>
